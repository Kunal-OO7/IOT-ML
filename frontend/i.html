<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anomaly Detection System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Dashboard Container -->
    <div class="dashboard-container">
        <!-- Title -->
        <h1 class="dashboard-title">Anomaly Detection System</h1>
        
        <!-- Flash Cards Container -->
        <div class="cards-container">
            <!-- Temperature Card -->
            <div class="flash-card" id="temp-card">
                <div class="card-icon">🌡️</div>
                <div class="card-title">Temperature (°C)</div>
                <div class="card-value" id="temp-value">28°C</div>
            </div>
            
            <!-- CO2 Card -->
            <div class="flash-card" id="co2-card">
                <div class="card-icon">💨</div>
                <div class="card-title">CO₂ (ppm)</div>
                <div class="card-value" id="co2-value">800 PPM</div>
            </div>
            
            <!-- Humidity Card -->
            <div class="flash-card" id="humidity-card">
                <div class="card-icon">💧</div>
                <div class="card-title">Humidity (%)</div>
                <div class="card-value" id="humidity-value">39%</div>
            </div>
        </div>
        
        <!-- Alert Box -->
        <div class="alert-box" id="alert-box">
            <span class="alert-icon">⚠</span>
            <span class="alert-text">Alert Window (will activate if anomaly is detected)</span>
        </div>
        <!-- Alert Modal -->
<div id="alert-modal" class="alert-modal">
    <div class="modal-content">
        <span id="modal-close" class="modal-close">&times;</span>
        <h2>⚠ Anomaly Detected!</h2>
        <p id="modal-text">Something unusual was detected in the environment.</p>
    </div>
</div>

        <!-- History Box -->
        <div class="history-box">
            <div class="history-header">
                <h2 class="history-title">Historical Data</h2>
            </div>
            <div class="history-controls">
                <input type="datetime-local" id="datetime-picker" class="datetime-input">
                <button id="fetch-history-btn" class="fetch-button">Fetch History</button>
            </div>
            <div class="history-content" id="history-content">
                Select a date and time to view history.
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
