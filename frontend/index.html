<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IoT Sentinel — Anomaly Detection</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:       #080c10;
    --surface:  #0d1520;
    --border:   #1a2a3a;
    --accent:   #00e5ff;
    --warn:     #ff6b35;
    --critical: #ff1744;
    --high:     #ff9100;
    --low:      #ffea00;
    --ok:       #00ff88;
    --dim:      #3a5068;
    --text:     #c8dce8;
    --mono:     'Share Tech Mono', monospace;
    --sans:     'Rajdhani', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,.015) 2px, rgba(0,229,255,.015) 4px);
    pointer-events: none; z-index: 1000;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px; border-bottom: 1px solid var(--border);
    background: linear-gradient(90deg, #0a1520 0%, #080c10 100%);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: var(--mono); font-size: 1.1rem; color: var(--accent); letter-spacing: .12em; }
  .logo span { color: var(--dim); }
  .status-bar { display: flex; align-items: center; gap: 20px; font-family: var(--mono); font-size: .75rem; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 8px var(--ok); animation: pulse 2s infinite; }
  .status-dot.offline { background: var(--dim); box-shadow: none; animation: none; }
  #clock { color: var(--dim); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  main { padding: 28px 32px; display: grid; gap: 24px; }
  .gauges { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .gauge-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 22px 24px; position: relative;
    overflow: hidden; transition: border-color .3s;
  }
  .gauge-card.anomaly-LOW      { border-color: var(--low);     box-shadow: 0 0 20px rgba(255,234,0,.15); }
  .gauge-card.anomaly-HIGH     { border-color: var(--high);    box-shadow: 0 0 20px rgba(255,145,0,.15); }
  .gauge-card.anomaly-CRITICAL { border-color: var(--critical);box-shadow: 0 0 20px rgba(255,23,68,.2); animation: flicker .4s ease-in-out; }
  @keyframes flicker { 0%,100%{opacity:1} 50%{opacity:.85} }
  .gauge-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--accent); transition: background .3s; }
  .gauge-card.anomaly-LOW::before      { background: var(--low); }
  .gauge-card.anomaly-HIGH::before     { background: var(--high); }
  .gauge-card.anomaly-CRITICAL::before { background: var(--critical); }
  .gauge-label { font-family: var(--mono); font-size: .7rem; color: var(--dim); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px; }
  .gauge-value { font-family: var(--mono); font-size: 2.6rem; color: var(--accent); line-height: 1; transition: color .3s; }
  .gauge-card.anomaly-LOW .gauge-value      { color: var(--low); }
  .gauge-card.anomaly-HIGH .gauge-value     { color: var(--high); }
  .gauge-card.anomaly-CRITICAL .gauge-value { color: var(--critical); }
  .gauge-unit { font-family: var(--mono); font-size: .8rem; color: var(--dim); margin-left: 4px; }
  .gauge-status { margin-top: 10px; font-family: var(--mono); font-size: .7rem; color: var(--ok); }
  .gauge-card.anomaly-LOW .gauge-status      { color: var(--low); }
  .gauge-card.anomaly-HIGH .gauge-status     { color: var(--high); }
  .gauge-card.anomaly-CRITICAL .gauge-status { color: var(--critical); }
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .chart-full { grid-column: 1 / -1; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 20px; }
  .chart-title { font-family: var(--mono); font-size: .75rem; color: var(--dim); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 180px; }
  .alerts-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 20px; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .panel-title { font-family: var(--mono); font-size: .75rem; color: var(--dim); letter-spacing: .1em; text-transform: uppercase; }
  .alert-count { background: var(--warn); color: #000; font-family: var(--mono); font-size: .65rem; padding: 2px 8px; border-radius: 2px; font-weight: bold; }
  .export-btn {
    background: transparent; border: 1px solid var(--accent); color: var(--accent);
    font-family: var(--mono); font-size: .7rem; padding: 4px 12px;
    border-radius: 2px; cursor: pointer; letter-spacing: .08em;
    transition: background .2s;
  }
  .export-btn:hover { background: rgba(0,229,255,.1); }
  .alerts-list { display: flex; flex-direction: column; gap: 8px; max-height: 260px; overflow-y: auto; }
  .alert-item {
    display: grid; grid-template-columns: 110px 80px 1fr 70px 80px;
    gap: 10px; align-items: center; padding: 10px 14px;
    border-radius: 3px; font-family: var(--mono); font-size: .72rem;
    animation: slideIn .3s ease;
  }
  .alert-item.LOW      { background: rgba(255,234,0,.06);  border: 1px solid rgba(255,234,0,.2); }
  .alert-item.HIGH     { background: rgba(255,145,0,.06);  border: 1px solid rgba(255,145,0,.2); }
  .alert-item.CRITICAL { background: rgba(255,23,68,.08);  border: 1px solid rgba(255,23,68,.3); }
  @keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:none} }
  .alert-time  { color: var(--dim); }
  .alert-sev-LOW      { color: var(--low); }
  .alert-sev-HIGH     { color: var(--high); }
  .alert-sev-CRITICAL { color: var(--critical); }
  .alert-val  { color: var(--text); }
  .alert-score { color: var(--dim); }
  .no-alerts { font-family: var(--mono); font-size: .75rem; color: var(--dim); text-align: center; padding: 24px; }
  #error-banner { display: none; background: rgba(255,107,53,.1); border: 1px solid rgba(255,107,53,.3); color: var(--warn); font-family: var(--mono); font-size: .75rem; padding: 10px 32px; text-align: center; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<header>
  <div class="logo">IOT<span>/</span>SENTINEL &mdash; <span>ANOMALY DETECTION SYS</span></div>
  <div class="status-bar">
    <div class="status-dot" id="conn-dot"></div>
    <span id="conn-label" style="color:var(--ok)">LIVE</span>
    <span id="clock">--:--:--</span>
  </div>
</header>
<div id="error-banner">⚠ Cannot reach backend — retrying…</div>
<main>
  <div class="gauges">
    <div class="gauge-card" id="card-temp">
      <div class="gauge-label">// temperature</div>
      <div><span class="gauge-value" id="val-temp">--.-</span><span class="gauge-unit">°C</span></div>
      <div class="gauge-status" id="st-temp">● NOMINAL</div>
    </div>
    <div class="gauge-card" id="card-hum">
      <div class="gauge-label">// humidity</div>
      <div><span class="gauge-value" id="val-hum">--.-</span><span class="gauge-unit">%</span></div>
      <div class="gauge-status" id="st-hum">● NOMINAL</div>
    </div>
    <div class="gauge-card" id="card-co2">
      <div class="gauge-label">// co₂ level</div>
      <div><span class="gauge-value" id="val-co2">----</span><span class="gauge-unit">ppm</span></div>
      <div class="gauge-status" id="st-co2">● NOMINAL</div>
    </div>
  </div>
  <div class="charts">
    <div class="chart-card chart-full">
      <div class="chart-title">// sensor history — last 5 minutes</div>
      <div class="chart-wrap"><canvas id="chart-history"></canvas></div>
    </div>
  </div>
  <div class="alerts-panel">
    <div class="panel-header">
      <div class="panel-title">// anomaly log</div>
      <div style="display:flex;gap:12px;align-items:center;">
        <button class="export-btn" onclick="exportCSV()">⬇ EXPORT CSV</button>
        <div class="alert-count" id="alert-count">0</div>
      </div>
    </div>
    <div class="alerts-list" id="alerts-list">
      <div class="no-alerts">NO ANOMALIES DETECTED</div>
    </div>
  </div>
</main>
<script>
const clockEl = document.getElementById('clock');
setInterval(() => { clockEl.textContent = new Date().toLocaleTimeString('en-GB'); }, 1000);

// ── Chart ─────────────────────────────────────────────────────────────────────
const chartCtx = document.getElementById('chart-history').getContext('2d');
Chart.defaults.color = '#3a5068';
Chart.defaults.font.family = "'Share Tech Mono', monospace";
Chart.defaults.font.size = 10;

const makeDataset = (label, color) => ({
  label, data: [], borderColor: color, backgroundColor: color + '18',
  borderWidth: 1.5, pointRadius: 0, tension: 0.3, fill: false,
});

const histChart = new Chart(chartCtx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      makeDataset('TEMP (°C)',  '#00e5ff'),
      makeDataset('HUM (%)',    '#00ff88'),
      makeDataset('CO₂ (ppm)', '#ff9500'),
    ],
  },
  options: {
    responsive: true, maintainAspectRatio: false, animation: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { position: 'top', labels: { boxWidth: 12, padding: 20, color: '#3a5068' } },
      tooltip: { backgroundColor: '#0d1520', borderColor: '#1a2a3a', borderWidth: 1 }
    },
    scales: {
      x: { grid: { color: '#0d1a26' }, ticks: { maxTicksLimit: 8 } },
      y: { grid: { color: '#0d1a26' } }
    }
  }
});

function pushHistory(rows) {
  if (!rows || !rows.length) return;
  histChart.data.labels           = rows.map(r => new Date(r.time).toLocaleTimeString('en-GB'));
  histChart.data.datasets[0].data = rows.map(r => r.temperature);
  histChart.data.datasets[1].data = rows.map(r => r.humidity);
  histChart.data.datasets[2].data = rows.map(r => r.co2);
  histChart.update('none');
}

// ── Gauges ────────────────────────────────────────────────────────────────────
function updateGauge(field, value, severity) {
  const card = document.getElementById(`card-${field}`);
  const val  = document.getElementById(`val-${field}`);
  const st   = document.getElementById(`st-${field}`);
  if (value !== undefined && value !== null)
    val.textContent = parseFloat(value).toFixed(field === 'co2' ? 0 : 1);
  card.className = 'gauge-card' + (severity ? ` anomaly-${severity}` : '');
  st.textContent = severity ? `⚠ ${severity}` : '● NOMINAL';
}

// ── Alerts ────────────────────────────────────────────────────────────────────
const alertsList   = document.getElementById('alerts-list');
const alertCountEl = document.getElementById('alert-count');
let totalAlerts = 0;
const allAnomalies = [];

function renderAnomaly(a) {
  const sev = a.severity || 'LOW';
  const div = document.createElement('div');
  div.className = `alert-item ${sev}`;
  const t = new Date(a.timestamp).toLocaleTimeString('en-GB');
  div.innerHTML = `
    <span class="alert-time">${t}</span>
    <span class="alert-sev-${sev}">${sev}</span>
    <span class="alert-val">T:${parseFloat(a.temperature).toFixed(1)}° H:${parseFloat(a.humidity).toFixed(1)}% CO₂:${parseFloat(a.co2).toFixed(0)}</span>
    <span class="alert-score">${a.anomaly_score}</span>
    <span class="alert-score" style="color:${sev==='CRITICAL'?'var(--critical)':sev==='HIGH'?'var(--high)':'var(--low)'}">●</span>
  `;
  return div;
}

function showAnomalies(anomalies) {
  if (!anomalies || !anomalies.length) return;
  const placeholder = alertsList.querySelector('.no-alerts');
  if (placeholder) placeholder.remove();
  anomalies.forEach(a => {
    allAnomalies.unshift(a);
    alertsList.insertBefore(renderAnomaly(a), alertsList.firstChild);
    totalAlerts++;
  });
  alertCountEl.textContent = totalAlerts;
  while (alertsList.children.length > 50) alertsList.removeChild(alertsList.lastChild);
}

// ── Export CSV ────────────────────────────────────────────────────────────────
function exportCSV() {
  fetch('/api/history')
    .then(r => r.json())
    .then(rows => {
      const header = 'timestamp,temperature,humidity,co2\n';
      const body   = rows.map(r => `${r.time},${r.temperature},${r.humidity},${r.co2}`).join('\n');
      const blob   = new Blob([header + body], { type: 'text/csv' });
      const url    = URL.createObjectURL(blob);
      const a      = document.createElement('a');
      a.href = url; a.download = `sensor_export_${Date.now()}.csv`;
      a.click(); URL.revokeObjectURL(url);
    });
}

// ── Connection ────────────────────────────────────────────────────────────────
const dot    = document.getElementById('conn-dot');
const label  = document.getElementById('conn-label');
const banner = document.getElementById('error-banner');
function setConnected(ok) {
  dot.className     = 'status-dot' + (ok ? '' : ' offline');
  label.textContent = ok ? 'LIVE' : 'OFFLINE';
  label.style.color = ok ? 'var(--ok)' : 'var(--warn)';
  banner.style.display = ok ? 'none' : 'block';
}

// ── SSE ───────────────────────────────────────────────────────────────────────
function connectStream() {
  const es = new EventSource('/api/stream');
  es.onopen = () => setConnected(true);
  es.onmessage = (e) => {
    try {
      const { latest, anomalies } = JSON.parse(e.data);
      if (!latest) return;

      const activeFields = new Set((anomalies || []).map(a => {
        if (Math.abs(a.temperature - (latest.temperature||0)) < 1) return 'temp';
        if (Math.abs(a.humidity    - (latest.humidity||0))    < 1) return 'hum';
        if (Math.abs(a.co2        - (latest.co2||0))          < 5) return 'co2';
        return null;
      }).filter(Boolean));

      const severityMap = {};
      (anomalies || []).forEach(a => {
        if (Math.abs(a.temperature - (latest.temperature||0)) < 1) severityMap['temp'] = a.severity;
        if (Math.abs(a.humidity    - (latest.humidity||0))    < 1) severityMap['hum']  = a.severity;
        if (Math.abs(a.co2        - (latest.co2||0))          < 5) severityMap['co2']  = a.severity;
      });

      updateGauge('temp', latest.temperature, severityMap['temp'] || null);
      updateGauge('hum',  latest.humidity,    severityMap['hum']  || null);
      updateGauge('co2',  latest.co2,         severityMap['co2']  || null);

      if (anomalies && anomalies.length) showAnomalies(anomalies);
    } catch(err) { console.error(err); }
  };
  es.onerror = () => { setConnected(false); es.close(); setTimeout(connectStream, 5000); };
}

async function fetchHistory() {
  try {
    const rows = await fetch('/api/history').then(r => r.json());
    pushHistory(rows);
  } catch {}
}
//done
fetchHistory();
setInterval(fetchHistory, 10_000);
connectStream();
</script>
</body>
</html>
